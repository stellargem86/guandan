[alembic]
# Alembic migration configuration
script_location = app/migrations
prepend_sys_path = .

# Database URL (sync driver for offline mode)
# Online mode uses async URL from app.config via env.py
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/shenguanhui

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
