# ===================================================
# 深掼会平台 - 上游服务配置
# ===================================================

# FastAPI 后端服务
upstream fastapi_backend {
    # 主后端实例 (Docker 内部网络通过服务名解析)
    server api:8000;

    # 负载均衡 - 可扩展多实例 (取消注释以启用)
    # server api-2:8000;
    # server api-3:8000;

    # 连接保活
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}
