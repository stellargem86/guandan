# ===================================================
# 深掼会平台 - Docker Compose 部署配置
# ===================================================

version: "3.8"

services:
  # -------------------------------------------------
  # Nginx API Gateway
  # -------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: sgh-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - admin_dist:/usr/share/nginx/html/admin:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sgh-network
    restart: unless-stopped

  # -------------------------------------------------
  # FastAPI 后端服务
  # -------------------------------------------------
  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: sgh-api
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${API_WORKERS:-2}
      --access-log
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET}
      - WECHAT_MCH_ID=${WECHAT_MCH_ID}
      - WECHAT_MCH_KEY=${WECHAT_MCH_KEY}
      - WECHAT_NOTIFY_URL=${WECHAT_NOTIFY_URL}
      - OSS_ACCESS_KEY=${OSS_ACCESS_KEY}
      - OSS_SECRET_KEY=${OSS_SECRET_KEY}
      - OSS_BUCKET=${OSS_BUCKET}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sgh-network
    restart: unless-stopped

  # -------------------------------------------------
  # PostgreSQL 数据库
  # -------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sgh-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sgh-network
    restart: unless-stopped

  # -------------------------------------------------
  # Redis 缓存与消息队列
  # -------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sgh-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - sgh-network
    restart: unless-stopped

# -------------------------------------------------
# 网络配置
# -------------------------------------------------
networks:
  sgh-network:
    driver: bridge
    name: sgh-network

# -------------------------------------------------
# 数据卷
# -------------------------------------------------
volumes:
  postgres_data:
    name: sgh-postgres-data
  redis_data:
    name: sgh-redis-data
  nginx_logs:
    name: sgh-nginx-logs
  admin_dist:
    name: sgh-admin-dist
